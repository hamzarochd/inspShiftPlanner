_schema-version: 3.3.0
ID: inps_shiftplanner
description: A simple CAP project.
version: 1.0.0
modules:
- name: inps_shiftplanner-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: inps_shiftplanner-auth
  - name: inps_shiftplanner-db
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: inps_shiftplanner-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: inps_shiftplanner-db
  parameters:
    buildpack: nodejs_buildpack
- name: inps_shiftplanner-destination-content
  type: com.sap.application.content
  requires:
  - name: inps_shiftplanner-destination-service
    parameters:
      content-target: true
  - name: inps_shiftplanner_html_repo_host
    parameters:
      service-key:
        name: inps_shiftplanner_html_repo_host-key
  - name: inps_shiftplanner-auth
    parameters:
      service-key:
        name: inps_shiftplanner-auth-key
  parameters:
    content:
      instance:
        destinations:
        - Name: inps_shiftplanner_inps_shiftplanner_html_repo_host
          ServiceInstanceName: inps_shiftplanner-html5-app-host-service
          ServiceKeyName: inps_shiftplanner_html_repo_host-key
          sap.cloud.service: inps_shiftplanner
        - Authentication: OAuth2UserTokenExchange
          Name: inps_shiftplanner_inps_shiftplanner_auth
          ServiceInstanceName: inps_shiftplanner-auth
          ServiceKeyName: inps_shiftplanner-auth-key
          sap.cloud.service: inps_shiftplanner
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: inps_shiftplanner-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: inps_shiftplanner_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - inpsshiftplanner.zip
      name: inpsshiftplanner
      target-path: resources/
- name: inpsshiftplanner
  type: html5
  path: app/inps_shiftplanner
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: inps_shiftplanner-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
      tenant-mode: dedicated
      xsappname: inps_shiftplanner-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
- name: inps_shiftplanner-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: inps_shiftplanner-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: inps_shiftplanner-destination-service
    service-plan: lite
- name: inps_shiftplanner_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: inps_shiftplanner-html5-app-host-service
    service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
